<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMap 密钥测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        #map { width: 100%; height: 400px; margin: 20px 0; border: 1px solid #ccc; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AMap 密钥测试页面</h1>
        
        <div class="status info">
            <p>当前使用的密钥: <code id="key-display"></code></p>
            <p>测试时间: <span id="time-display"></span></p>
        </div>
        
        <div id="status" class="status"></div>
        
        <div id="map"></div>
        
        <div class="info">
            <h3>调试步骤:</h3>
            <ol>
                <li>检查控制台是否有错误信息</li>
                <li>确认密钥在高德控制台已启用</li>
                <li>确认白名单已配置: localhost:3000, 127.0.0.1</li>
                <li>清除浏览器缓存后重试</li>
            </ol>
        </div>
    </div>

    <script>
        // 使用你的AMap密钥
        const amapKey = '8d4b1ce0f777a7690ff3719897d61668';
        
        document.getElementById('key-display').textContent = amapKey;
        document.getElementById('time-display').textContent = new Date().toLocaleString();
        
        function updateStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
        }
        
        function loadAMap() {
            updateStatus('正在加载AMap SDK...', 'info');
            
            // 创建脚本标签
            const script = document.createElement('script');
            script.src = `https://webapi.amap.com/maps?v=2.0&key=${amapKey}&plugin=AMap.Scale,AMap.ToolBar`;
            script.async = true;
            script.defer = true;
            
            script.onload = function() {
                if (window.AMap) {
                    updateStatus('✅ AMap SDK 加载成功!', 'success');
                    
                    // 创建地图
                    try {
                        const map = new AMap.Map('map', {
                            zoom: 11,
                            center: [121.4737, 31.2304], // 上海
                            viewMode: '2D'
                        });
                        
                        // 添加标记
                        const marker = new AMap.Marker({
                            position: [121.4737, 31.2304],
                            title: '测试标记'
                        });
                        map.add(marker);
                        
                        // 添加控件
                        map.addControl(new AMap.Scale());
                        map.addControl(new AMap.ToolBar());
                        
                        updateStatus('✅ 地图创建成功! AMap功能正常。', 'success');
                    } catch (error) {
                        updateStatus(`❌ 地图创建失败: ${error.message}`, 'error');
                        console.error('地图创建错误:', error);
                    }
                } else {
                    updateStatus('❌ AMap SDK加载但window.AMap未定义', 'error');
                }
            };
            
            script.onerror = function() {
                updateStatus('❌ AMap SDK加载失败。请检查密钥和网络连接。', 'error');
            };
            
            document.head.appendChild(script);
        }
        
        // 页面加载后开始测试
        window.onload = loadAMap;
        
        // 监听控制台错误
        window.addEventListener('error', function(event) {
            console.log('全局错误捕获:', event.error);
        });
    </script>
</body>
</html>
